<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code Web UI</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-ws@2.0.3/ws.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-input: #0f3460;
            --text-primary: #e8e8e8;
            --text-secondary: #a0a0b0;
            --accent: #e94560;
            --accent-hover: #ff6b81;
            --user-msg-bg: #0f3460;
            --assistant-msg-bg: #1a1a3e;
            --border-color: #2a2a4a;
            --success: #4caf50;
            --warning: #ff9800;
            --error: #e94560;
            --dropzone-border: #4a4a6a;
            --dropzone-active: #e94560;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--bg-secondary);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        header h1 { font-size: 1.2rem; font-weight: 600; }

        #new-conversation-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.2s;
        }

        #new-conversation-btn:hover { background: var(--accent-hover); }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .message.user {
            align-self: flex-end;
            background: var(--user-msg-bg);
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background: var(--assistant-msg-bg);
            border-bottom-left-radius: 4px;
        }

        .message.system {
            align-self: center;
            background: transparent;
            font-size: 0.85rem;
            padding: 6px 12px;
            max-width: 90%;
        }

        .message.system.success { color: var(--success); }
        .message.system.error { color: var(--error); }
        .message.system.warning { color: var(--warning); }

        .message.assistant pre {
            background: rgba(0, 0, 0, 0.3);
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 8px 0;
        }

        .message.assistant code {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 0.9em;
        }

        .message.assistant p { margin-bottom: 8px; }
        .message.assistant p:last-child { margin-bottom: 0; }

        .message .attachments {
            margin-top: 8px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .file-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(0,0,0,0.2);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .upload-progress-bar {
            margin-top: 4px;
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            overflow: hidden;
        }

        .upload-progress-bar .fill {
            height: 100%;
            background: var(--accent);
            transition: width 0.2s;
        }

        #drop-zone {
            border: 2px dashed var(--dropzone-border);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            margin-bottom: 8px;
        }

        #drop-zone.active {
            border-color: var(--dropzone-active);
            background: rgba(233, 69, 96, 0.08);
        }

        #drop-zone:hover {
            border-color: var(--accent);
        }

        #input-area {
            background: var(--bg-secondary);
            padding: 16px 24px;
            border-top: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        #input-row {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        #file-input { display: none; }

        #message-input {
            flex: 1;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: inherit;
            resize: none;
            min-height: 42px;
            max-height: 150px;
            outline: none;
            transition: border-color 0.2s;
        }

        #message-input:focus { border-color: var(--accent); }

        #send-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        #send-btn:hover { background: var(--accent-hover); }
        #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .typing-indicator {
            align-self: flex-start;
            color: var(--text-secondary);
            font-style: italic;
            padding: 8px 16px;
        }

        @media (max-width: 768px) {
            .message { max-width: 90%; }
            #chat-container { padding: 12px; }
            #input-area { padding: 12px; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Claude Code Web UI</h1>
        <button id="new-conversation-btn" onclick="startNewConversation()">New Conversation</button>
    </header>

    <div id="chat-container"></div>

    <div id="input-area">
        <div id="drop-zone"
             onclick="document.getElementById('file-input').click()">
            Drop files here or click to upload
        </div>
        <input type="file" id="file-input" multiple onchange="handleFiles(this.files)" />
        <div id="input-row">
            <textarea id="message-input"
                      placeholder="Type a message... (Enter to send, Shift+Enter for newline)"
                      rows="1"
                      onkeydown="handleKeyDown(event)"></textarea>
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        let conversationId = null;
        let ws = null;
        let isWaiting = false;
        let streamingDiv = null;
        let streamingContent = '';

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws/chat`);

            ws.onmessage = function(event) {
                const data = JSON.parse(event.data);
                console.log('[WS recv]', data.type, data);
                handleServerMessage(data);
            };

            ws.onclose = function() {
                setTimeout(connectWebSocket, 2000);
            };

            ws.onerror = function(err) {
                console.error('WebSocket error:', err);
            };
        }

        function handleServerMessage(data) {
            const container = document.getElementById('chat-container');

            switch(data.type) {
                case 'connected':
                    conversationId = data.conversation_id;
                    break;

                case 'msg':
                    if (data.from === 'assistant') {
                        const msgDiv = document.createElement('div');
                        msgDiv.className = 'message assistant';
                        msgDiv.setAttribute('data-msg-id', data.id);
                        msgDiv.innerHTML = marked.parse(data.text || '');
                        if (data.file) {
                            const fileLink = document.createElement('div');
                            fileLink.className = 'attachments';
                            fileLink.innerHTML = `<a class="file-badge" href="${data.file.url}" target="_blank">${data.file.name}</a>`;
                            msgDiv.appendChild(fileLink);
                        }
                        container.appendChild(msgDiv);
                        setWaiting(false);
                        scrollToBottom();
                    }
                    break;

                case 'edit':
                    const editTarget = container.querySelector(`[data-msg-id="${data.id}"]`);
                    if (editTarget) {
                        editTarget.innerHTML = marked.parse(data.text || '');
                        scrollToBottom();
                    }
                    break;

                case 'assistant_chunk':
                    if (!streamingDiv) {
                        streamingDiv = document.createElement('div');
                        streamingDiv.className = 'message assistant';
                        container.appendChild(streamingDiv);
                        streamingContent = '';
                    }
                    streamingContent += data.content;
                    streamingDiv.innerHTML = marked.parse(streamingContent);
                    scrollToBottom();
                    break;

                case 'assistant_complete':
                    if (streamingDiv) {
                        streamingDiv.innerHTML = marked.parse(data.content);
                    }
                    streamingDiv = null;
                    streamingContent = '';
                    setWaiting(false);
                    scrollToBottom();
                    break;

                case 'error':
                    appendSystemMessage('Error: ' + data.detail, 'error');
                    setWaiting(false);
                    break;

                case 'warning':
                    appendSystemMessage('Warning: ' + data.detail, 'warning');
                    break;
            }
        }

        function sendMessage() {
            const input = document.getElementById('message-input');
            const content = input.value.trim();
            if (!content) return;
            if (isWaiting) return;
            if (!ws || ws.readyState !== WebSocket.OPEN) return;

            appendUserMessage(content);

            const msg = {
                type: 'user_message',
                content: content,
                conversation_id: conversationId,
            };

            ws.send(JSON.stringify(msg));
            input.value = '';
            input.style.height = 'auto';
            setWaiting(true);
        }

        function appendUserMessage(content) {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = 'message user';
            div.textContent = content;
            container.appendChild(div);
            scrollToBottom();
        }

        function appendSystemMessage(text, level) {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = 'message system ' + (level || '');
            div.textContent = text;
            container.appendChild(div);
            scrollToBottom();
        }

        function setWaiting(waiting) {
            isWaiting = waiting;
            document.getElementById('send-btn').disabled = waiting;
            document.getElementById('message-input').disabled = waiting;
        }

        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        /* ---- File upload (independent from chat messages) ---- */

        function handleFiles(fileList) {
            if (!fileList || fileList.length === 0) return;
            for (const file of fileList) {
                uploadFile(file);
            }
            document.getElementById('file-input').value = '';
        }

        function uploadFile(file) {
            const container = document.getElementById('chat-container');

            const wrapper = document.createElement('div');
            wrapper.className = 'message system';

            const label = document.createElement('span');
            label.textContent = 'Uploading ' + file.name + '...';
            wrapper.appendChild(label);

            const barOuter = document.createElement('div');
            barOuter.className = 'upload-progress-bar';
            const barFill = document.createElement('div');
            barFill.className = 'fill';
            barFill.style.width = '0%';
            barOuter.appendChild(barFill);
            wrapper.appendChild(barOuter);

            container.appendChild(wrapper);
            scrollToBottom();

            const formData = new FormData();
            formData.append('files', file);

            const xhr = new XMLHttpRequest();

            xhr.upload.addEventListener('progress', function(e) {
                if (e.lengthComputable) {
                    const pct = Math.round((e.loaded / e.total) * 100);
                    barFill.style.width = pct + '%';
                    label.textContent = 'Uploading ' + file.name + '... ' + pct + '%';
                }
            });

            xhr.addEventListener('load', function() {
                wrapper.remove();
                if (xhr.status === 201) {
                    const result = JSON.parse(xhr.responseText);
                    const info = result.files[0];
                    appendSystemMessage('File available: ' + info.path, 'success');
                } else {
                    let detail = 'Unknown error';
                    try {
                        detail = JSON.parse(xhr.responseText).detail || detail;
                    } catch (_) { /* ignore */ }
                    appendSystemMessage('Upload failed (' + file.name + '): ' + detail, 'error');
                }
            });

            xhr.addEventListener('error', function() {
                wrapper.remove();
                appendSystemMessage('Upload failed (' + file.name + '): network error', 'error');
            });

            xhr.open('POST', '/api/files/upload');
            xhr.send(formData);
        }

        /* ---- Drag & drop ---- */

        (function setupDragDrop() {
            const dropZone = document.getElementById('drop-zone');

            ['dragenter', 'dragover'].forEach(evt => {
                dropZone.addEventListener(evt, function(e) {
                    e.preventDefault();
                    dropZone.classList.add('active');
                });
            });

            ['dragleave', 'drop'].forEach(evt => {
                dropZone.addEventListener(evt, function() {
                    dropZone.classList.remove('active');
                });
            });

            dropZone.addEventListener('drop', function(e) {
                e.preventDefault();
                handleFiles(e.dataTransfer.files);
            });

            // Also allow dropping on the whole page
            document.body.addEventListener('dragover', function(e) {
                e.preventDefault();
                dropZone.classList.add('active');
            });

            document.body.addEventListener('dragleave', function(e) {
                if (!e.relatedTarget || e.relatedTarget === document.documentElement) {
                    dropZone.classList.remove('active');
                }
            });

            document.body.addEventListener('drop', function(e) {
                e.preventDefault();
                dropZone.classList.remove('active');
                handleFiles(e.dataTransfer.files);
            });
        })();

        function startNewConversation() {
            conversationId = null;
            document.getElementById('chat-container').innerHTML = '';
            streamingDiv = null;
            streamingContent = '';
            setWaiting(false);

            if (ws) ws.close();
            connectWebSocket();
        }

        function scrollToBottom() {
            const container = document.getElementById('chat-container');
            container.scrollTop = container.scrollHeight;
        }

        /* ---- Clipboard paste (text = default, image = upload as screenshot) ---- */

        function handlePaste(e) {
            const items = e.clipboardData && e.clipboardData.items;
            if (!items) return;

            for (const item of items) {
                if (item.type.startsWith('image/')) {
                    e.preventDefault();
                    const blob = item.getAsFile();
                    if (!blob) return;
                    const now = new Date();
                    const pad = (n, len) => String(n).padStart(len, '0');
                    const ts = pad(now.getFullYear(), 4)
                        + pad(now.getMonth() + 1, 2)
                        + pad(now.getDate(), 2)
                        + pad(now.getHours(), 2)
                        + pad(now.getMinutes(), 2)
                        + pad(now.getSeconds(), 2)
                        + '.' + pad(now.getMilliseconds(), 3);
                    const filename = 'screenshot_' + ts + '.png';
                    const file = new File([blob], filename, { type: 'image/png' });
                    uploadFile(file);
                    return;
                }
            }
        }

        // Auto-resize textarea
        document.addEventListener('DOMContentLoaded', function() {
            const textarea = document.getElementById('message-input');
            textarea.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 150) + 'px';
            });
            textarea.addEventListener('paste', handlePaste);

            connectWebSocket();
        });
    </script>
</body>
</html>
